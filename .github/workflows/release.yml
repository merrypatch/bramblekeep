name: Release

# Publishes signed binaries of a release on tag `vX.Y.Z`, plus the manifest
# `latest.json` consumed by the in-app update checker. Binaries embed the frontend (rust-embed) → one
# artifact = one complete installation (single-binary property).
#
# Required secret: MINISIGN_SECRET_KEY = contents of a minisign private key WITHOUT
# passphrase (generated by `minisign -G -W`). The corresponding PUBLIC key will
# be embedded in the binary for verification on APPLY (phase 2).

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # create the release + upload assets

jobs:
  # 1) Build per platform (frontend + binary), upload as a workflow artifact.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: bramblekeep-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: bramblekeep-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: bramblekeep-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: bramblekeep-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Embedded frontend: web/dist must exist before `cargo build` (build.rs).
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build front
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/bramblekeep.exe" "dist/${{ matrix.asset }}"
          else
            cp "target/${{ matrix.target }}/release/bramblekeep" "dist/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

      # Linux only: a convenience .tar.gz bundling the binary + deploy/ so a
      # first install is `tar xzf … && sudo ./deploy/install.sh`. systemd is
      # Linux-specific, so macOS/Windows ship the bare binary only. This tarball
      # is NOT referenced by latest.json — the in-app updater always fetches the
      # bare binary + its .minisig.
      - name: Bundle Linux tarball (binary + deploy scripts)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          stage="pkg/${{ matrix.asset }}"
          mkdir -p "$stage/deploy"
          cp "dist/${{ matrix.asset }}" "$stage/${{ matrix.asset }}"
          cp deploy/install.sh deploy/bramblekeep.service "$stage/deploy/"
          chmod +x "$stage/${{ matrix.asset }}" "$stage/deploy/install.sh"
          tar -C pkg -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"

      - name: Upload Linux tarball artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.tar.gz
          path: dist/${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  # 2) Signs all artifacts, assembles + signs the manifest, creates the Release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y minisign jq

      - name: Import signing key
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key

      - name: Sign binaries + build manifest
        id: manifest
        env:
          VERSION: ${{ github.ref_name }} # ex. v0.2.0
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"                       # 0.2.0
          base="https://github.com/${REPO}/releases/download/${VERSION}"
          artifacts_json="[]"
          cd staging
          for f in bramblekeep-*; do
            # Skip convenience tarballs: they are for manual install only and
            # must NOT enter latest.json (the updater fetches the bare binary).
            case "$f" in *.tar.gz|*.minisig) continue ;; esac
            # Detached signature (.minisig) — verified on APPLY by the binary.
            minisign -S -s ../minisign.key -m "$f" -x "$f.minisig"
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            # os/arch derived from the asset name (bramblekeep-<os>-<arch>[.exe]).
            name="${f%.exe}"; os="${name#bramblekeep-}"; os="${os%-*}"; arch="${name##*-}"
            artifacts_json=$(jq -c \
              --arg os "$os" --arg arch "$arch" \
              --arg url "$base/$f" --arg sha "$sha" \
              '. += [{os:$os, arch:$arch, url:$url, sha256:$sha}]' <<<"$artifacts_json")
          done
          # Sign the Linux tarball(s) too (integrity for manual installs), kept
          # out of the manifest above.
          for t in bramblekeep-*.tar.gz; do
            [ -e "$t" ] || continue
            minisign -S -s ../minisign.key -m "$t" -x "$t.minisig"
          done
          jq -n \
            --arg version "$ver" \
            --arg notes "See the release page for details." \
            --arg url "https://github.com/${REPO}/releases/tag/${VERSION}" \
            --argjson artifacts "$artifacts_json" \
            '{version:$version, notes:$notes, url:$url, artifacts:$artifacts}' > latest.json
          minisign -S -s ../minisign.key -m latest.json -x latest.json.minisig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            staging/bramblekeep-*
            staging/latest.json
            staging/latest.json.minisig
        # Note: `staging/latest.json` is also accessible via the alias
        # `releases/latest/download/latest.json` (default for UPDATE_MANIFEST_URL).
