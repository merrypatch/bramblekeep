name: Release

# On a version tag `vX.Y.Z`, this workflow:
#   1. builds the statically-linked (musl) Linux binaries — x64 + arm64 (Pi),
#   2. signs them + assembles the signed `latest.json` update manifest, creates
#      the GitHub Release (bare-metal channel + in-app self-update),
#   3. wraps the SAME binaries into a multi-arch Docker image on GHCR.
#
# One compiled artifact, three consumption paths: bare binary, systemd install,
# and container. macOS/Windows are intentionally not built — this is a
# self-hosted server workload.
#
# Required secret: MINISIGN_SECRET_KEY = a passphrase-less minisign private key
# (`minisign -G -W`). Its public key is embedded in the binary for update verify.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: write # create the release + upload assets
  packages: write # push the image to GHCR

jobs:
  # 1) Build the frontend + a static musl binary per architecture.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: bramblekeep-linux-x64
          - target: aarch64-unknown-linux-musl
            asset: bramblekeep-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Embedded frontend: web/dist must exist before `cargo build` (build.rs).
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build front
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `cross` ships the musl + cross C toolchains (needed by the bundled
      # libsqlite3-sys C) in a container — uniform across both architectures.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }} --locked

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/bramblekeep" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

      # Convenience .tar.gz bundling the binary + deploy/ so a manual install is
      # `tar xzf … && sudo ./deploy/install.sh`. NOT referenced by latest.json
      # (the in-app updater fetches the bare binary + its .minisig).
      - name: Bundle tarball (binary + deploy scripts)
        run: |
          stage="pkg/${{ matrix.asset }}"
          mkdir -p "$stage/deploy"
          cp "dist/${{ matrix.asset }}" "$stage/${{ matrix.asset }}"
          cp deploy/install.sh deploy/bramblekeep.service "$stage/deploy/"
          chmod +x "$stage/${{ matrix.asset }}" "$stage/deploy/install.sh"
          tar -C pkg -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.tar.gz
          path: dist/${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  # 2) Sign artifacts, assemble + sign the manifest, create the Release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # RELEASE_NOTES.md for the release body

      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y minisign jq

      - name: Import signing key
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key

      - name: Sign binaries + build manifest
        env:
          VERSION: ${{ github.ref_name }} # ex. v0.2.0
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"                       # 0.2.0
          base="https://github.com/${REPO}/releases/download/${VERSION}"
          artifacts_json="[]"
          cd staging
          for f in bramblekeep-*; do
            # Convenience tarballs stay out of latest.json (updater fetches the
            # bare binary), but are still signed below.
            case "$f" in *.tar.gz|*.minisig) continue ;; esac
            minisign -S -s ../minisign.key -m "$f" -x "$f.minisig"
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            # os/arch from the asset name (bramblekeep-<os>-<arch>).
            os="${f#bramblekeep-}"; os="${os%-*}"; arch="${f##*-}"
            artifacts_json=$(jq -c \
              --arg os "$os" --arg arch "$arch" \
              --arg url "$base/$f" --arg sha "$sha" \
              '. += [{os:$os, arch:$arch, url:$url, sha256:$sha}]' <<<"$artifacts_json")
          done
          for t in bramblekeep-*.tar.gz; do
            [ -e "$t" ] || continue
            minisign -S -s ../minisign.key -m "$t" -x "$t.minisig"
          done
          jq -n \
            --arg version "$ver" \
            --arg notes "See the release page for details." \
            --arg url "https://github.com/${REPO}/releases/tag/${VERSION}" \
            --argjson artifacts "$artifacts_json" \
            '{version:$version, notes:$notes, url:$url, artifacts:$artifacts}' > latest.json
          minisign -S -s ../minisign.key -m latest.json -x latest.json.minisig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            staging/bramblekeep-*
            staging/latest.json
            staging/latest.json.minisig

  # 3) Wrap the prebuilt binaries into a multi-arch image and push to GHCR.
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Dockerfile.release

      - name: Collect binaries
        uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      # buildx passes TARGETARCH as amd64/arm64 → name the binaries to match.
      - name: Stage binaries for buildx
        run: |
          mkdir -p dist
          cp staging/bramblekeep-linux-x64   dist/bramblekeep-amd64
          cp staging/bramblekeep-linux-arm64 dist/bramblekeep-arm64

      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
