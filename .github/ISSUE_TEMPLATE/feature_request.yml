name: Feature request
description: Suggest an improvement or a new capability.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Bramblekeep has a strong data model: **everything is an item + blocks, with
        a read lens on top**. Features that fit that shape land fastest. If your idea
        needs a brand-new storage model, say so — it's still welcome, just a bigger discussion.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case first — what are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might it work? Rough sketches are fine.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use today, or other approaches you weighed.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
